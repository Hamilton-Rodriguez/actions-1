name: Workflow Filters and Activities
on:
  workflow_dispatch:
  #schedule:
  #  - cron: "*/59 * * * *"
  push:
    #branches-ignore:    # Mutually exclusive with 'branches'
    #  - feature/*   # feature/add-music, feature/updateImages
    #  - test/**     # test/ui/index, test/checkout/payment
    branches:
      - main
      - '!feature/*'  # Ignoring pushing to any branch name starting with feature using !
  pull_request:
    types:
      - opened
      - closed
    paths-ignore:   # Workflow will only run when a pull request that includes a change on any file other than README.md
      - README.md
    branches:
      - main        # configure your workflow to only run on pull requests that target specific branches

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
    - run: echo this wokflow/job/step is executed for event type - ${{ github.event_name }}